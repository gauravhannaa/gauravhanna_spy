<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - GauravHanna Spy</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 40px; border-radius: 32px; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { width: 100%; padding: 12px; background: #1e88e5; color: white; border: none; border-radius: 30px; cursor: pointer; }
        a { color: #1e88e5; display: block; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Sign Up</h2>
        <form id="signupForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <a href="login.html">Already have an account?</a>
    </div>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('token', data.token);
                window.location.href = 'dashboard.html';
            } else {
                alert('Signup failed: ' + (data.message || 'Unknown error'));
            }
        });
    </script>
</body>
</html>
