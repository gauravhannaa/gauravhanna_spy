<!DOCTYPE html>
<html>
<head>
    <title>Setup - GauravHanna Spy</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: black;
            color: #0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
        }
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.8;
        }
        .card {
            background: rgba(0, 0, 0, 0.75);
            padding: 40px;
            border-radius: 32px;
            width: 320px;
            border: 1px solid #0f0;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            z-index: 1;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 5px #0f0;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #111;
            color: #0f0;
            border: 1px solid #0f0;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            color: #0f0;
            border: 1px solid #0f0;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #0f0;
            color: black;
            box-shadow: 0 0 15px #0f0;
        }
        .error {
            color: #ff4d4d;
            text-align: center;
            margin-top: 10px;
        }
        .info {
            color: #0f0;
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        a {
            color: #0f0;
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div class="card">
        <h2>Admin Setup</h2>
        <p style="font-size: 0.8rem; margin-bottom: 20px;">Set permanent password and phone number for login.</p>
        <form id="setupForm">
            <input type="password" id="password" placeholder="New Permanent Password" required>
            <input type="text" id="phone" placeholder="Phone Number (with country code)" required>
            <button type="submit">Save</button>
        </form>
        <div id="errorMsg" class="error"></div>
        <div id="infoMsg" class="info"></div>
        <a href="login.html">Back to Login</a>
    </div>

    <script>
        const API_URL = "https://gauravhanna-spy.onrender.com";

        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phone').value;

            if (!password || password.length < 6) {
                document.getElementById('errorMsg').innerText = 'Password must be at least 6 characters';
                return;
            }

            if (!phone || phone.length < 10) {
                document.getElementById('errorMsg').innerText = 'Please enter a valid phone number with country code';
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/auth/setup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, phone })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('infoMsg').innerText = '✅ Settings saved! Please login.';
                    document.getElementById('errorMsg').innerText = '';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    document.getElementById('errorMsg').innerText = data.message || 'Error saving settings';
                }
            } catch (err) {
                document.getElementById('errorMsg').innerText = 'Network error. Please try again.';
            }
        });

        // Matrix Rain Effect
        (function() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+{}[];':\",./<>?\\|`~";
            const fontSize = 14;
            let columns = Math.floor(width / fontSize);
            let drops = [];
            function init() {
                columns = Math.floor(width / fontSize);
                drops = [];
                for (let i = 0; i < columns; i++) drops[i] = Math.floor(Math.random() * height);
            }
            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = "#0f0";
                ctx.font = fontSize + "px monospace";
                for (let i = 0; i < drops.length; i++) {
                    const text = characters.charAt(Math.floor(Math.random() * characters.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
                requestAnimationFrame(draw);
            }
            window.addEventListener('resize', () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                init();
            });
            init();
            draw();
        })();
    </script>
</body>
</html>
