<!DOCTYPE html>
<html>
<head>
    <title>Login - GauravHanna Spy</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: black;
            color: #0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
        }
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.8;
        }
        .card {
            background: rgba(0, 0, 0, 0.75);
            padding: 40px;
            border-radius: 32px;
            width: 320px;
            border: 1px solid #0f0;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            z-index: 1;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 5px #0f0;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #111;
            color: #0f0;
            border: 1px solid #0f0;
            outline: none;
            transition: all 0.3s;
        }
        input:focus {
            box-shadow: 0 0 10px #0f0;
        }
        button {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            color: #0f0;
            border: 1px solid #0f0;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover:not(:disabled) {
            background: #0f0;
            color: black;
            box-shadow: 0 0 15px #0f0;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: rgba(0,0,0,0.4);
            margin-top: 5px;
        }
        .error {
            color: #ff4d4d;
            text-align: center;
            margin-top: 10px;
        }
        .info {
            color: #0f0;
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        .hidden {
            display: none;
        }
        a {
            color: #0f0;
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
        }
        a:hover {
            text-shadow: 0 0 5px #0f0;
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div class="card">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="text" id="inputField" placeholder="Enter Password" autocomplete="off" required>
            <button type="submit" id="actionBtn">Continue</button>
            <button type="button" id="resendBtn" class="btn-secondary hidden">Resend OTP</button>
        </form>
        <div id="errorMsg" class="error"></div>
        <div id="infoMsg" class="info"></div>
        <a href="signup.html" id="signupLink">Create account</a>
    </div>

    <script>
        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 800;
                gainNode.gain.value = 0.2;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
                oscillator.stop(audioCtx.currentTime + 0.2);
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } catch (e) {}
        }

        const API_URL = "https://gauravhanna-spy.onrender.com";
        let state = "password";
        let cooldown = false;

        const form = document.getElementById('loginForm');
        const input = document.getElementById('inputField');
        const actionBtn = document.getElementById('actionBtn');
        const resendBtn = document.getElementById('resendBtn');
        const errorDiv = document.getElementById('errorMsg');
        const infoDiv = document.getElementById('infoMsg');

        function showError(msg) {
            errorDiv.innerText = msg;
            infoDiv.innerText = '';
        }
        function showInfo(msg) {
            infoDiv.innerText = msg;
            errorDiv.innerText = '';
        }

        async function resendOTP() {
            if (cooldown) return;
            showInfo('Sending OTP...');
            try {
                const res = await fetch(`${API_URL}/api/auth/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                if (data.success) {
                    showInfo('OTP sent successfully');
                    startCooldown();
                } else {
                    showError(data.message || 'Failed to send OTP');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            }
        }

        function startCooldown() {
            cooldown = true;
            resendBtn.disabled = true;
            let seconds = 30;
            resendBtn.innerText = `Resend OTP (${seconds}s)`;
            const interval = setInterval(() => {
                seconds--;
                if (seconds <= 0) {
                    clearInterval(interval);
                    resendBtn.disabled = false;
                    resendBtn.innerText = 'Resend OTP';
                    cooldown = false;
                } else {
                    resendBtn.innerText = `Resend OTP (${seconds}s)`;
                }
            }, 1000);
        }

        async function verifyPassword(password) {
            try {
                const res = await fetch(`${API_URL}/api/auth/verify-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                if (data.success) {
                    const otpRes = await fetch(`${API_URL}/api/auth/send-otp`, {
                        method: 'POST'
                    });
                    const otpData = await otpRes.json();
                    if (otpData.success) {
                        showInfo('OTP sent successfully');
                        state = "otp";
                        input.value = '';
                        input.placeholder = 'Enter OTP';
                        actionBtn.innerText = 'Login';
                        resendBtn.classList.remove('hidden');
                        startCooldown();
                    } else {
                        showError(otpData.message || 'Failed to send OTP');
                    }
                } else {
                    showError(data.message || 'Invalid password');
                }
            } catch (err) {
                showError('Server error. Please try again.');
            }
        }

        async function verifyOTP(otp) {
            try {
                const res = await fetch(`${API_URL}/api/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ otp })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    showError(data.message || 'Invalid OTP');
                }
            } catch (err) {
                showError('Server error. Please try again.');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            playBeep();

            const value = input.value.trim();
            if (!value) {
                showError('Please enter a value');
                return;
            }

            if (state === "password") {
                await verifyPassword(value);
            } else {
                await verifyOTP(value);
            }
        });

        resendBtn.addEventListener('click', () => {
            resendOTP();
        });

        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }

        // Matrix Rain Effect
        (function() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+{}[];':\",./<>?\\|`~";
            const fontSize = 14;
            let columns = Math.floor(width / fontSize);
            let drops = [];
            function init() {
                columns = Math.floor(width / fontSize);
                drops = [];
                for (let i = 0; i < columns; i++) drops[i] = Math.floor(Math.random() * height);
            }
            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = "#0f0";
                ctx.font = fontSize + "px monospace";
                for (let i = 0; i < drops.length; i++) {
                    const text = characters.charAt(Math.floor(Math.random() * characters.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
                requestAnimationFrame(draw);
            }
            window.addEventListener('resize', () => {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                init();
            });
            init();
            draw();
        })();
    </script>
</body>
</html>
