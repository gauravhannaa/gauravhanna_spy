<!DOCTYPE html>
<html>
<head>
    <title>Login - GauravHanna Spy</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 40px; border-radius: 32px; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { width: 100%; padding: 12px; background: #1e88e5; color: white; border: none; border-radius: 30px; cursor: pointer; }
        button:disabled { background: gray; cursor: not-allowed; }
        a { color: #1e88e5; display: block; text-align: center; margin-top: 20px; }
        .error { color: #ff4d4d; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="loginBtn">Login</button>
        </form>

        <!-- ✅ Error message -->
        <div class="error" id="errorMsg"></div>

        <a href="signup.html">Create account</a>
    </div>

    <script>
        const API_URL = "https://gauravhanna-spy.onrender.com"; // ✅ FIXED for production

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.innerText = "Logging in...";
            errorMsg.innerText = "";

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (data.success) {
                    // ✅ Save token + user
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.innerText = data.message || "Login failed";
                }

            } catch (err) {
                console.error("Login Error ❌:", err);
                errorMsg.innerText = "Server error. Try again.";
            }

            btn.disabled = false;
            btn.innerText = "Login";
        });

        // ✅ Auto redirect if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
